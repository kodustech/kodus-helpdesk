name: "QA Deploy"

on:
    push:
        branches: [main]
    workflow_dispatch:
        inputs:
            image_tag:
                description: "Image tag for ECR (default: github.sha)"
                required: false

concurrency:
    group: qa-deploy
    cancel-in-progress: true

permissions:
    contents: read
    deployments: write

env:
    AWS_REGION: ${{ secrets.AWS_REGION }}
    IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}

jobs:
    build-and-push:
        name: Build & Push Images
        runs-on: ubuntu-latest
        environment: QA

        steps:
            - name: Checkout code
              uses: actions/checkout@v4.2.2

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4.1.0
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Fetch env from Parameter Store
              run: |
                  bash scripts/dev/fetch-env-qa.sh qa
                  cp .env.qa apps/web/.env

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2.0.1

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3.10.0

            - name: Build & push API image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: docker/Dockerfile
                  target: api
                  push: true
                  tags: |
                      ${{ steps.login-ecr.outputs.registry }}/kodus-helpdesk-api-qa:${{ env.IMAGE_TAG }}
                      ${{ steps.login-ecr.outputs.registry }}/kodus-helpdesk-api-qa:qa-latest
                  cache-from: type=gha,scope=helpdesk-api
                  cache-to: type=gha,scope=helpdesk-api,mode=max

            - name: Build & push Web image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: docker/Dockerfile
                  target: web
                  push: true
                  tags: |
                      ${{ steps.login-ecr.outputs.registry }}/kodus-helpdesk-web-qa:${{ env.IMAGE_TAG }}
                      ${{ steps.login-ecr.outputs.registry }}/kodus-helpdesk-web-qa:qa-latest
                  cache-from: type=gha,scope=helpdesk-web
                  cache-to: type=gha,scope=helpdesk-web,mode=max

    deploy:
        name: Deploy to QA
        runs-on: ubuntu-latest
        needs: build-and-push
        environment: QA

        steps:
            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4.1.0
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2.0.1

            - name: Get runner IP and mask it
              id: get_ip
              run: |
                  ip=$(curl -s https://ipinfo.io/ip)
                  echo "::add-mask::$ip"
                  echo "runner_ip=$ip" >> $GITHUB_ENV

            - name: Add runner IP to Security Group
              run: |
                  aws ec2 authorize-security-group-ingress \
                    --group-id ${{ secrets.AWS_SECURITY_GROUP }} \
                    --protocol tcp --port 22 \
                    --cidr "${{ env.runner_ip }}/32" > /dev/null 2>&1

            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.2.2
              with:
                  host: ${{ secrets.AWS_QA_HOST }}
                  username: ${{ secrets.AWS_QA_USERNAME }}
                  key: ${{ secrets.AWS_QA_KEY_SSH }}
                  script: |
                      cd ~/kodus-helpdesk
                      ./start.sh qa ${{ env.IMAGE_TAG }}

            - name: Remove runner IP from Security Group
              if: always()
              run: |
                  aws ec2 revoke-security-group-ingress \
                    --group-id ${{ secrets.AWS_SECURITY_GROUP }} \
                    --protocol tcp --port 22 \
                    --cidr "${{ env.runner_ip }}/32" > /dev/null 2>&1

            - name: Notify Discord
              if: always()
              uses: sarisia/actions-status-discord@v1.15.3
              with:
                  webhook: ${{ secrets.DISCORD_WEBHOOK }}
                  status: ${{ job.status }}
                  title: "Deploy QA: kodus-helpdesk"
                  username: GitHub Actions
