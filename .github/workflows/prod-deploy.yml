name: "Production Deploy"

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            image_tag:
                description: "Image tag for ECR (default: release tag)"
                required: false

concurrency:
    group: prod-deploy
    cancel-in-progress: false

permissions:
    contents: read

env:
    AWS_REGION: ${{ secrets.AWS_REGION }}
    IMAGE_TAG: ${{ github.event.inputs.image_tag || github.event.release.tag_name || github.sha }}

jobs:
    build-and-push:
        name: Build & Push Images
        runs-on: ubuntu-latest
        environment: production

        steps:
            - name: Validate tag format
              if: github.event_name == 'release'
              run: |
                  TAG="${{ env.IMAGE_TAG }}"
                  if ! echo "$TAG" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                    echo "Invalid tag format (expected x.y.z): $TAG"
                    exit 1
                  fi

            - name: Checkout code
              uses: actions/checkout@v4.2.2

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4.1.0
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Fetch env from Parameter Store
              run: |
                  bash scripts/dev/fetch-env-prod.sh prod
                  cp .env.prod apps/web/.env

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2.0.1

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3.10.0

            - name: Build & push API image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: docker/Dockerfile
                  target: api
                  push: true
                  tags: |
                      ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_API }}:${{ env.IMAGE_TAG }}
                      ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_API }}:latest
                  cache-from: type=gha,scope=helpdesk-api-prod
                  cache-to: type=gha,scope=helpdesk-api-prod,mode=max

            - name: Build & push Web image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: docker/Dockerfile
                  target: web
                  push: true
                  tags: |
                      ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_WEB }}:${{ env.IMAGE_TAG }}
                      ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_WEB }}:latest
                  cache-from: type=gha,scope=helpdesk-web-prod
                  cache-to: type=gha,scope=helpdesk-web-prod,mode=max

    deploy:
        name: Deploy to Production
        runs-on: ubuntu-latest
        needs: build-and-push
        environment: production

        steps:
            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4.1.0
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Get runner IP and mask it
              run: |
                  ip=$(curl -s https://ipinfo.io/ip)
                  echo "::add-mask::$ip"
                  echo "runner_ip=$ip" >> $GITHUB_ENV

            - name: Add runner IP to Security Group
              run: |
                  aws ec2 authorize-security-group-ingress \
                    --group-id ${{ secrets.AWS_SECURITY_GROUP }} \
                    --protocol tcp --port 22 \
                    --cidr "${{ env.runner_ip }}/32" > /dev/null 2>&1

            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.2.2
              with:
                  host: ${{ secrets.AWS_PROD_HOST }}
                  username: ${{ secrets.AWS_PROD_USERNAME }}
                  key: ${{ secrets.AWS_PROD_KEY_SSH }}
                  script: |
                      cd ~/kodus-helpdesk
                      ./scripts/start.sh prod ${{ env.IMAGE_TAG }}

            - name: Remove runner IP from Security Group
              if: always()
              run: |
                  aws ec2 revoke-security-group-ingress \
                    --group-id ${{ secrets.AWS_SECURITY_GROUP }} \
                    --protocol tcp --port 22 \
                    --cidr "${{ env.runner_ip }}/32" > /dev/null 2>&1

            - name: Notify Discord (Success)
              if: success()
              env:
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
              run: |
                  if [ -n "$DISCORD_WEBHOOK" ]; then
                    curl -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK" -d '{
                      "embeds": [{
                        "title": "Kodus Helpdesk: Production Deploy",
                        "description": "Version **${{ env.IMAGE_TAG }}** deployed successfully",
                        "color": 5763719,
                        "fields": [
                          {"name": "Version", "value": "`${{ env.IMAGE_TAG }}`", "inline": true},
                          {"name": "Triggered by", "value": "@${{ github.actor }}", "inline": true}
                        ],
                        "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'"
                      }]
                    }'
                  fi

            - name: Notify Discord (Failure)
              if: failure()
              env:
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
              run: |
                  if [ -n "$DISCORD_WEBHOOK" ]; then
                    curl -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK" -d '{
                      "embeds": [{
                        "title": "Kodus Helpdesk: Production Deploy FAILED",
                        "description": "Failed to deploy version **${{ env.IMAGE_TAG }}**",
                        "color": 15158332,
                        "fields": [
                          {"name": "Version", "value": "`${{ env.IMAGE_TAG }}`", "inline": true},
                          {"name": "Triggered by", "value": "@${{ github.actor }}", "inline": true},
                          {"name": "Logs", "value": "[View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
                        ],
                        "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'"
                      }]
                    }'
                  fi
