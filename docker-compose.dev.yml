services:
    helpdesk-api:
        build:
            context: .
            dockerfile: docker/Dockerfile.dev
        command: yarn start:dev:api
        ports:
            - '${API_PORT:-3003}:3003'
            - '9239:9229'
        environment:
            - API_PORT=3003
            - API_NODE_ENV=development
            - API_PG_DB_HOST=db_postgres
            - API_PG_DB_PORT=5432
            - API_PG_DB_USERNAME=${API_PG_DB_USERNAME:-kodusdev}
            - API_PG_DB_PASSWORD=${API_PG_DB_PASSWORD:-123456}
            - API_PG_DB_DATABASE=${API_PG_DB_DATABASE:-kodus_db}
            - JWT_SECRET=${JWT_SECRET:-helpdesk-dev-secret}
            - KODUS_JWT_SECRET=${KODUS_JWT_SECRET:-}
            - API_CUSTOMERIO_APP_API_TOKEN=${API_CUSTOMERIO_APP_API_TOKEN:-}
            - API_CUSTOMERIO_BASE_URL=${API_CUSTOMERIO_BASE_URL:-https://api.customer.io}
            - HELPDESK_FRONTEND_URL=http://localhost:${WEB_PORT:-3004}
            - RUN_MIGRATIONS=${RUN_MIGRATIONS:-true}
            - RUN_SEEDS=${RUN_SEEDS:-true}
            - GITHUB_TOKEN=${GITHUB_TOKEN:-}
            - GITHUB_ORG=${GITHUB_ORG:-kodustech}
            - GITHUB_PROJECT_NUMBER=${GITHUB_PROJECT_NUMBER:-1}
            - GITHUB_REPOSITORY=${GITHUB_REPOSITORY:-kodus-ai}
            - AWS_REGION=${AWS_REGION:-us-east-1}
            - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-minioadmin}
            - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-minioadmin}
            - AWS_BUCKET_NAME=${AWS_BUCKET_NAME:-kodus-helpdesk}
            - AWS_S3_ENDPOINT=http://minio:9000
            - AWS_S3_FORCE_PATH_STYLE=true
        volumes:
            - .:/app
            - /app/node_modules
        deploy:
            resources:
                limits:
                    memory: 1.5G
                reservations:
                    memory: 512M
        healthcheck:
            test:
                [
                    'CMD',
                    'node',
                    '-e',
                    "fetch('http://localhost:3003/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        networks:
            - helpdesk-network
            - kodus-backend-services

    helpdesk-web:
        build:
            context: .
            dockerfile: docker/Dockerfile.dev
        command: yarn start:dev:web
        ports:
            - '${WEB_PORT:-3004}:3004'
        environment:
            - WEB_NODE_ENV=development
            - WEB_HOSTNAME_API=http://helpdesk-api:3003
            - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-3003}
            - AUTH_SECRET=${AUTH_SECRET:-helpdesk-nextauth-secret}
            - NEXTAUTH_URL=http://localhost:${WEB_PORT:-3004}
        volumes:
            - .:/app
            - /app/node_modules
            - /app/apps/web/.next
        depends_on:
            helpdesk-api:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 2G
                reservations:
                    memory: 512M
        networks:
            - helpdesk-network

    minio:
        image: minio/minio:latest
        command: server /data --console-address ":9001"
        ports:
            - '9000:9000'
            - '9001:9001'
        environment:
            - MINIO_ROOT_USER=minioadmin
            - MINIO_ROOT_PASSWORD=minioadmin
        volumes:
            - helpdesk_minio:/data
        healthcheck:
            test: ['CMD', 'mc', 'ready', 'local']
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - helpdesk-network

    minio-init:
        image: minio/mc:latest
        depends_on:
            minio:
                condition: service_healthy
        entrypoint: >
            /bin/sh -c "
            mc alias set local http://minio:9000 minioadmin minioadmin;
            mc mb --ignore-existing local/kodus-helpdesk;
            exit 0;
            "
        networks:
            - helpdesk-network

    db_postgres:
        image: postgres:16
        ports:
            - '${DB_PORT:-5433}:5432'
        environment:
            - POSTGRES_USER=${API_PG_DB_USERNAME:-kodusdev}
            - POSTGRES_PASSWORD=${API_PG_DB_PASSWORD:-123456}
            - POSTGRES_DB=${API_PG_DB_DATABASE:-kodus_db}
        volumes:
            - helpdesk_pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${API_PG_DB_USERNAME:-kodusdev}']
            interval: 10s
            timeout: 5s
            retries: 5
        profiles:
            - local-db
        networks:
            - helpdesk-network

volumes:
    helpdesk_pgdata:
    helpdesk_minio:

networks:
    helpdesk-network:
        driver: bridge
    kodus-backend-services:
        external: true
